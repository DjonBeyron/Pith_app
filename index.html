<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Pithy</title>
    <!-- Запуск с домашнего экрана как полноценное приложение (без UI браузера).
         iOS 26 всегда оставляет системную зону высотой со статус-бар — либо
         сверху (black), либо снизу (black-translucent), поделить нельзя.
         Зона рисуется самой iOS ВНЕ страницы — сплошным нативным чёрным,
         никакой CSS внутри приложения её не красит и не растушёвывает.
         Раньше был выбран black-translucent (зона внизу, под нижним баром) —
         там она давала резкий нестыкующийся край. Теперь content=black:
         зона наверху (над статус-баром/чёлкой, видео в ленте под ней уже не
         заходит), а низ — целиком наш нижний бар без чужеродной полосы -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Pithy" />
    <meta name="theme-color" content="#0b0d10" />
    <!-- Манифест — современный iOS строит стартовый экран веб-приложения из
         background_color + иконки (apple-touch-startup-image ниже он может
         игнорировать). После изменения нужно УДАЛИТЬ и заново добавить
         приложение на домашний экран -->
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">
    <link rel="icon" href="/icons/icon-192.png" type="image/png">
    <!-- Экран запуска iOS (пока качается HTML): без него система показывает
         чёрный кадр перед сплэшем. PNG = фон сплэша + то же лого (генерятся
         scripts/make-startup-images.ps1). iOS берёт картинку ТОЛЬКО при точном
         совпадении размера с экраном — поэтому по ссылке на каждый iPhone -->
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="/splash/startup-640x1136.png">
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/splash/startup-750x1334.png">
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1242x2208.png">
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1125x2436.png">
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/splash/startup-828x1792.png">
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1242x2688.png">
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1170x2532.png">
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1284x2778.png">
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1179x2556.png">
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1290x2796.png">
    <link rel="apple-touch-startup-image" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1206x2622.png">
    <link rel="apple-touch-startup-image" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1320x2868.png">
    <link rel="apple-touch-startup-image" media="(device-width: 420px) and (device-height: 912px) and (-webkit-device-pixel-ratio: 3)" href="/splash/startup-1260x2736.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Montserrat latin only — Cyrillic falls back to Comfortaa.
         Грузим НЕблокирующе (media=print → onload media=all): render-blocking
         <link> ждал бы загрузки шрифтов перед самым первым кадром — и до лого
         мелькала чернота. Сплэшу шрифты не нужны (system-ui), а контент ленты
         догрузит их за анимацией сплэша. noscript — фолбэк без JS. -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&subset=latin" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css?family=Comfortaa:400" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&subset=latin" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css?family=Comfortaa:400" rel="stylesheet">
    </noscript>
    <!-- Стартовый сплэш: инлайновый CSS/SVG, рисуется на первом же кадре (до
         скачивания JS-бандла) — вместо чёрного экрана сразу видно лого. React
         подаёт сигнал window.__pithyReady, когда лента готова, и сплэш «улетает»
         (масштаб+фейд), открывая Рекомендации. Логотип — заглушка, заменим. -->
    <style>
      /* Чёрный фон первого кадра — в тон системному launch screen, чтобы не
         было скачка; цвет приложения проявляется сплэшем (см. splashBgIn) */
      html, body { margin: 0; background: #000; }
      /* Появление в два шага, без скачка от чёрного: сначала плавно проявляется
         фон приложения (opacity 0→1), затем — лого и слово */
      #splash {
        position: fixed; inset: 0; z-index: 2147483000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; background: #0b0d10;
        opacity: 0; animation: splashBgIn 350ms ease forwards;
      }
      #splash .splash-logo {
        width: 92px; height: 92px;
        filter: drop-shadow(0 10px 34px rgba(182, 254, 59, 0.22));
      }
      #splash .splash-word {
        font: 700 22px/1 system-ui, -apple-system, "Segoe UI", sans-serif;
        letter-spacing: 1px; color: #f2f5f7;
      }
      #splash .splash-logo,
      #splash .splash-word { opacity: 0; animation: splashItemIn 300ms ease 300ms forwards; }
      /* Версия — внизу по центру, тише слова/лого (маленькая и приглушённая,
         чтобы не спорить с логотипом за внимание) */
      #splash .splash-version {
        position: absolute; left: 50%; bottom: calc(28px + env(safe-area-inset-bottom, 0px));
        transform: translateX(-50%);
        font: 600 11px/1 system-ui, -apple-system, "Segoe UI", sans-serif;
        color: rgba(242, 245, 247, 0.4);
        opacity: 0; animation: splashItemIn 300ms ease 300ms forwards;
      }
      @keyframes splashBgIn { to { opacity: 1; } }
      @keyframes splashItemIn { to { opacity: 1; } }
      /* Уход: фон растворяется, лого «наезжает» (масштаб вверх) — полёт в экран.
         splash-out переопределяет анимации появления, поэтому opacity лого в
         splashZoom держим явно (иначе он мгновенно исчез бы, вернувшись к 0) */
      #splash.splash-out { animation: splashOut 350ms ease forwards; pointer-events: none; }
      #splash.splash-out .splash-logo,
      #splash.splash-out .splash-word { animation: splashZoom 350ms ease forwards; }
      #splash.splash-out .splash-version { animation: splashOut 350ms ease forwards; }
      @keyframes splashOut { from { opacity: 1; } to { opacity: 0; } }
      @keyframes splashZoom { from { opacity: 1; } to { opacity: 1; transform: scale(1.6); } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="splash" aria-hidden="true">
      <svg class="splash-logo" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="84" height="84" rx="24" fill="#b6fe3b" />
        <g transform="translate(24,20) scale(2)">
          <path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z" fill="#0d1500" />
        </g>
      </svg>
      <div class="splash-word">Pithy</div>
      <div class="splash-version" id="splash-version"></div>
    </div>

    <script type="module">
      // Версия — из единого источника правды (src/shared/lib/version.js),
      // Vite бандлит этот импорт вместе с остальным модульным графом
      import { APP_VERSION } from '/src/shared/lib/version.js'
      var el = document.getElementById('splash-version')
      if (el) el.textContent = 'v' + APP_VERSION
    </script>

    <script>
      /* Координация сплэша: показать лого сразу, убрать когда приложение готово
         (__pithyReady зовёт лента, дождавшись ПЕРВОГО РЕАЛЬНОГО КАДРА видео —
         см. FeedTab), но не раньше минимума (иначе моргнёт) и не позже
         страховки CAP (не зависаем на лого, если сеть тупит). CSS бандла в
         сборке неблокирующий (см. vite.config.js) — поэтому скрывать сплэш
         можно только когда стили реально доехали (__pithyCssReady), иначе под
         ним голый HTML. В dev помеченной ссылки [data-app-css] нет — считаем
         CSS готовым сразу. HARD — потолок на случай зависшего CSS.
         Все события пишем в window.__splashLog — DBG-панель ленты их покажет. */
      (function () {
        /* MIN: появление двухшаговое (фон 350мс, лого к 600мс) — держим лого
           ещё ~300мс, иначе при быстрой готовности оно улетало бы, едва успев
           проявиться */
        var t0 = performance.now(), MIN = 900, CAP = 6000, HARD = 8000, done = false;
        var appReady = false, cssReady = !document.querySelector('link[data-app-css]');
        var LOG = window.__splashLog = [];
        function slog(m) { LOG.push('[' + (performance.now() / 1000).toFixed(2) + '] splash: ' + m); }
        slog('первый кадр (HTML разобран, cssReady=' + cssReady + ')');
        function hide() {
          if (done) return; done = true;
          slog('улетает');
          var el = document.getElementById('splash');
          if (!el) return;
          el.classList.add('splash-out');
          setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 450);
        }
        function maybeHide() { if (appReady && cssReady) hide(); }
        window.__pithyCssReady = function () {
          if (!cssReady) slog('CSS бандла загружен');
          cssReady = true; maybeHide();
        };
        var cssLink = document.querySelector('link[data-app-css]');
        if (cssLink) cssLink.addEventListener('error', window.__pithyCssReady);
        window.__pithyReady = function (why) {
          slog('приложение готово: ' + (why || '?'));
          setTimeout(function () { appReady = true; maybeHide(); },
            Math.max(0, MIN - (performance.now() - t0)));
        };
        setTimeout(function () {
          if (done || appReady) return;
          slog('CAP ' + CAP + 'мс — не ждём дольше');
          appReady = true; maybeHide();
        }, CAP);
        setTimeout(hide, HARD);
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
