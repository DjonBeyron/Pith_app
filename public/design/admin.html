<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Макет — Админ-панель</title>
<link rel="stylesheet" href="proto.css">
<style>
  .screen { flex: 1; overflow-y: auto; padding: 18px 16px 20px; }
  .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .head h1 { font-size: 19px; font-weight: 800; }
  .whoChip { font-size: 11px; color: var(--dim); border: 1px solid var(--line); padding: 3px 8px; border-radius: 6px; }
  .subTabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .stab {
    flex: 1; border: 1px solid var(--line); background: var(--panel);
    color: var(--muted); border-radius: 999px; padding: 9px 4px;
    font-size: 12.5px; font-weight: 600;
  }
  .stabActive {
    background: var(--dust-d), var(--grain-d), linear-gradient(180deg, #ceff73, #a9f335);
    border-color: var(--accent); color: var(--on-accent);
  }
  .btnPrimary { margin-bottom: 14px; }
  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; margin-bottom: 10px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
  }
  .thumb {
    width: 48px; height: 64px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85);
  }
  .thumb svg { width: 18px; height: 18px; }
  .t1 { background: linear-gradient(160deg, #24343f, #121a1f); }
  .t2 { background: linear-gradient(160deg, #3a2d3f, #171219); }
  .tEmpty { background: none; border: 1px dashed #333b46; color: var(--dim); }
  .rowBody { flex: 1; min-width: 0; }
  .rowTitle { font-size: 15px; font-weight: 700; }
  .rowSub { margin: 3px 0 8px; font-size: 12px; color: var(--muted); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .chipOk { color: var(--accent); background: rgba(182,254,59,0.1); border: 1px solid rgba(182,254,59,0.3); }
  .chipWarn { color: #ffc861; background: rgba(255,200,97,0.08); border: 1px solid rgba(255,200,97,0.3); }
  .chipDim { color: var(--muted); background: none; border: 1px solid var(--line); }
  .chev { color: var(--dim); flex-shrink: 0; }
  .chev svg { width: 18px; height: 18px; }
  .backHub { top: auto; bottom: 74px; }
</style>
</head>
<body>
<div class="phone">
  <a class="backHub" href="index.html">&larr; все макеты</a>
  <div class="screen">
    <div class="head">
      <h1>Админ-панель</h1>
      <span class="whoChip">видна только is_admin</span>
    </div>

    <div class="subTabs">
      <button class="stab stabActive">Модули</button>
      <button class="stab">Файлы</button>
    </div>

    <button class="btnPrimary">+ Новый модуль</button>

    <div class="row">
      <div class="thumb t1"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7L8 5z"/></svg></div>
      <div class="rowBody">
        <div class="rowTitle">It&rsquo;s up to you</div>
        <div class="rowSub">5 уроков &middot; открыть схему и редактор</div>
        <div class="chips"><span class="chip chipOk">видео есть</span><span class="chip chipOk">опубликован</span></div>
      </div>
      <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 5 7 7-7 7"/></svg></span>
    </div>

    <div class="row">
      <div class="thumb t2"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7L8 5z"/></svg></div>
      <div class="rowBody">
        <div class="rowTitle">Break the ice</div>
        <div class="rowSub">5 уроков &middot; открыть схему и редактор</div>
        <div class="chips"><span class="chip chipOk">видео есть</span><span class="chip chipOk">опубликован</span></div>
      </div>
      <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 5 7 7-7 7"/></svg></span>
    </div>

    <div class="row">
      <div class="thumb tEmpty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
      <div class="rowBody">
        <div class="rowTitle">Rain check</div>
        <div class="rowSub">4 урока &middot; загрузить видео фразы</div>
        <div class="chips"><span class="chip chipWarn">нет видео</span><span class="chip chipDim">черновик</span></div>
      </div>
      <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 5 7 7-7 7"/></svg></span>
    </div>
  </div>

  <nav class="bottomNav">
    <a class="navBtn" href="feed.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="4"/><path d="M10 9.5v5l4.5-2.5L10 9.5z" fill="currentColor"/></svg>
      Уроки
    </a>
    <a class="navBtn" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5"/></svg>
      Профиль
    </a>
    <button class="navBtn navBtnActive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.5"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1"/></svg>
      Админ
    </button>
  </nav>
</div>
</body>
</html>
