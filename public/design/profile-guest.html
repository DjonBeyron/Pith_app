<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Макет — Профиль (гость)</title>
<link rel="stylesheet" href="proto.css">
<style>
  .screen {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 24px 24px 48px;
  }
  .logo { text-align: center; margin-bottom: 8px; font-size: 30px; font-weight: 900; letter-spacing: 0.5px; }
  .logo span { color: var(--accent); }
  .lead {
    text-align: center; font-size: 14px; line-height: 1.55;
    color: var(--muted); margin-bottom: 28px;
  }
  .field {
    width: 100%; margin-bottom: 10px; padding: 14px 16px;
    background: var(--dust), var(--grain) var(--panel);
    border: 1px solid var(--line); border-radius: 14px;
    color: var(--text); font-size: 15px; outline: none;
  }
  .field::placeholder { color: var(--dim); }
  .btnPrimary { margin-top: 8px; }
  .btnGhost { margin-top: 10px; }
  .bonus {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 20px; font-size: 13px; color: var(--muted);
  }
  .bonus svg { width: 16px; height: 16px; color: var(--accent); }
  .bonus b { color: var(--accent); }
</style>
</head>
<body>
<div class="phone">
  <a class="backHub" href="index.html">&larr; все макеты</a>
  <div class="screen">
    <div class="logo">Pithy<span>.</span></div>
    <div class="lead">Войди, чтобы сохранять прогресс,<br>копилку слов и закладки на всех устройствах</div>

    <input class="field" type="email" placeholder="Email">
    <input class="field" type="password" placeholder="Пароль">

    <a class="btnPrimary" href="profile.html">Войти</a>
    <button class="btnGhost">Создать аккаунт</button>

    <div class="bonus">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/></svg>
      За регистрацию — <b>+10 энергии</b>
    </div>
  </div>

  <nav class="bottomNav">
    <a class="navBtn" href="feed.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="4"/><path d="M10 9.5v5l4.5-2.5L10 9.5z" fill="currentColor"/></svg>
      Уроки
    </a>
    <button class="navBtn navBtnActive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5"/></svg>
      Профиль
    </button>
  </nav>
</div>
</body>
</html>
