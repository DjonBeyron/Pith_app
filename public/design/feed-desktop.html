<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Макет — Лента (ПК)</title>
<link rel="stylesheet" href="proto.css">
<style>
  body { display: flex; min-height: 100vh; padding: 0; }
  .desk {
    display: flex; width: 100%; max-width: 1280px; height: 100vh; max-height: 820px;
    margin: auto; background: var(--bg); overflow: hidden;
  }
  @media (min-width: 1320px) {
    .desk { border: 1px solid #2a2f36; border-radius: 20px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  }
  .side {
    width: 240px; flex-shrink: 0; padding: 22px 14px;
    display: flex; flex-direction: column; gap: 4px;
    border-right: 1px solid var(--line);
    background: var(--dust), var(--grain), var(--tex) var(--bg);
  }
  .logo { font-size: 24px; font-weight: 900; padding: 0 10px 18px; }
  .logo span { color: var(--accent); }
  .navItem {
    display: flex; align-items: center; gap: 12px; text-align: left;
    padding: 11px 12px; border: none; border-radius: 12px; background: none;
    color: var(--muted); font-size: 14.5px; font-weight: 600;
  }
  .navItem svg { width: 21px; height: 21px; flex-shrink: 0; }
  .navItemActive {
    color: var(--on-accent);
    background: var(--dust-d), var(--grain-d), linear-gradient(180deg, #ceff73, #a9f335);
  }
  .navSub {
    margin: 16px 10px 6px; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--dim);
  }
  .main { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; gap: 20px; }
  .videoCol {
    position: relative; width: 404px; height: 718px;
    border-radius: 18px; overflow: hidden;
    background:
      radial-gradient(120% 90% at 80% 10%, #24343f 0%, transparent 60%),
      radial-gradient(110% 80% at 15% 85%, #1d2a1a 0%, transparent 55%),
      linear-gradient(165deg, #12181f 0%, #0c1013 100%);
  }
  .videoHint {
    position: absolute; top: 46%; left: 0; right: 0;
    text-align: center; color: rgba(255,255,255,0.14);
    font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
  }
  .soundChip {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px; z-index: 5;
    padding: 8px 14px; border-radius: 999px;
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.14);
    color: #fff; font-size: 13px; font-weight: 500;
  }
  .soundChip svg { width: 16px; height: 16px; }
  .phraseBlock { position: absolute; left: 16px; right: 16px; bottom: 84px; z-index: 4; }
  .phraseEn {
    font-size: 28px; font-weight: 800; line-height: 1.15; color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.55);
  }
  .phraseEn mark { background: none; color: var(--accent); }
  .phraseRu { margin-top: 6px; font-size: 15px; color: rgba(255,255,255,0.75); }
  .learnBtn {
    position: absolute; left: 16px; right: 16px; bottom: 18px; z-index: 5;
    width: auto;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    border-radius: 999px;
    font-size: 16px; font-weight: 800;
    box-shadow: 0 6px 24px rgba(182, 254, 59, 0.35);
  }
  .learnBtn svg { width: 20px; height: 20px; }
  .hudSide { display: flex; flex-direction: column; gap: 20px; align-self: flex-end; padding-bottom: 26px; }
  .hudBtn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: none; border: none; color: var(--text);
  }
  .hudCircle {
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--dust), var(--grain) var(--panel);
    border: 1px solid var(--line);
  }
  .hudBtn svg { width: 24px; height: 24px; }
  .hudCount { font-size: 12px; font-weight: 600; color: var(--muted); }
  .navArrows {
    position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 12px;
  }
  .arrowBtn {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--dust), var(--grain) var(--panel);
    border: 1px solid var(--line); color: var(--muted);
  }
  .arrowBtn svg { width: 20px; height: 20px; }
  .backHub { position: fixed; }
</style>
</head>
<body>
<a class="backHub" href="index.html">&larr; все макеты</a>
<div class="desk">
  <aside class="side">
    <div class="logo">Pithy<span>.</span></div>
    <button class="navItem navItemActive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="4"/><path d="M10 9.5v5l4.5-2.5L10 9.5z" fill="currentColor"/></svg>
      Рекомендации
    </button>
    <a class="navItem" href="my-lessons-video.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      Мои уроки
    </a>
    <a class="navItem" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5"/></svg>
      Профиль
    </a>
    <div class="navSub">только is_admin</div>
    <a class="navItem" href="admin.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.5"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1"/></svg>
      Админ-панель
    </a>
  </aside>

  <main class="main">
    <div class="videoCol">
      <div class="videoHint">здесь — видео фразы</div>
      <div class="soundChip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>
        Включить звук
      </div>
      <div class="phraseBlock">
        <div class="phraseEn">It&rsquo;s <mark>up to</mark> you</div>
        <div class="phraseRu">5 слов в модуле</div>
      </div>
      <button class="btnPrimary learnBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/></svg>
        Изучить фразу
      </button>
    </div>

    <div class="hudSide">
      <button class="hudBtn">
        <span class="hudCircle"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10-9.3C.4 8.6 2.4 5 6 5c2.2 0 3.6 1.2 6 3.7C14.4 6.2 15.8 5 18 5c3.6 0 5.6 3.6 4 6.7C19.5 16.3 12 21 12 21z"/></svg></span>
        <span class="hudCount">1 284</span>
      </button>
      <button class="hudBtn">
        <span class="hudCircle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M6 3h12v18l-6-4.5L6 21V3z"/></svg></span>
        <span class="hudCount">96</span>
      </button>
      <button class="hudBtn">
        <span class="hudCircle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5l7 7-7 7v-4C7 15 4 17 2 20c0-7 4-11 12-11V5z"/></svg></span>
        <span class="hudCount">Репост</span>
      </button>
    </div>

    <div class="navArrows">
      <button class="arrowBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg></button>
      <button class="arrowBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
    </div>
  </main>
</div>
</body>
</html>
